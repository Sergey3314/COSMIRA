<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COSMIRA</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="bg"></div>
    
    <!-- ЭКРАН РЕГИСТРАЦИИ -->
    <section id="screen-register" class="screen hidden">
        <div class="header"><h1> Данные рождения</h1></div>
        <div class="card glass">
            <p>Для точных расчетов нужны:</p>
            <input type="text" id="reg-name" placeholder="Твое имя">
            <input type="date" id="reg-date">
            <input type="time" id="reg-time">
            <input type="text" id="reg-city" placeholder="Город рождения (Москва)">
            <button onclick="saveProfile()" class="btn-primary">Сохранить и продолжить</button>
        </div>
    </section>

    <!-- ГЛАВНОЕ МЕНЮ -->
    <section id="screen-main" class="screen hidden">
        <div class="header">
            <div><h1>COSMIRA</h1><p class="sub" id="user-name-display">Загрузка...</p></div>
            <button onclick="logout()" class="icon-btn">⚙️</button>
        </div>
        
        <div class="grid">
            <div class="card glass" onclick="openHoroscope()">
                <div class="icon">☀️</div><h3>Гороскоп</h3><p>Прогноз на день/год</p>
            </div>
            <div class="card glass" onclick="openNatal()">
                <div class="icon">️</div><h3>Натальная карта</h3><p>Твои планеты</p>
            </div>
            <div class="card glass" onclick="openCompatibility()">
                <div class="icon"></div><h3>Совместимость</h3><p>Синастрия</p>
            </div>
            <div class="card glass" onclick="openHorary()">
                <div class="icon">❓</div><h3>Хорар</h3><p>Ответ на вопрос</p>
            </div>
        </div>
    </section>

    <!-- ЭКРАН НАТАЛЬНОЙ КАРТЫ -->
    <section id="screen-natal" class="screen hidden">
        <div class="header"><button onclick="goHome()">←</button><h2>Натальная карта</h2></div>
        <div id="natal-content" class="card glass">
            <div class="loader">Расчет планет...</div>
        </div>
    </section>
    
    <!-- ЭКРАН СОВМЕСТИМОСТИ -->
    <section id="screen-compat" class="screen hidden">
        <div class="header"><button onclick="goHome()">←</button><h2>Совместимость</h2></div>
        <div class="card glass">
            <select id="s1">
                <option value="Aries">Овен</option><option value="Taurus">Телец</option>
                <option value="Gemini">Близнецы</option><option value="Cancer">Рак</option>
                <option value="Leo">Лев</option><option value="Virgo">Дева</option>
                <option value="Libra">Весы</option><option value="Scorpio">Скорпион</option>
                <option value="Sagittarius">Стрелец</option><option value="Capricorn">Козерог</option>
                <option value="Aquarius">Водолей</option><option value="Pisces">Рыбы</option>
            </select>
            <select id="s2">
                <option value="Aries">Овен</option><option value="Taurus">Телец</option>
                <option value="Gemini">Близнецы</option><option value="Cancer">Рак</option>
                <option value="Leo">Лев</option><option value="Virgo">Дева</option>
                <option value="Libra">Весы</option><option value="Scorpio">Скорпион</option>
                <option value="Sagittarius">Стрелец</option><option value="Capricorn">Козерог</option>
                <option value="Aquarius">Водолей</option><option value="Pisces">Рыбы</option>
            </select>
            <button onclick="checkCompat()" class="btn-primary">Рассчитать</button>
            <div id="compat-result" class="result-box"></div>
        </div>
    </section>

    <script src="/static/app.js"></script>
</body>
</html>
